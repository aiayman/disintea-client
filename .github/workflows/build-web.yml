name: Build & Deploy Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build React frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web (browser-only bundle)
        env:
          VITE_SIGNALING_URL: ${{ secrets.VITE_SIGNALING_URL }}
          VITE_TURN_URL: ${{ secrets.VITE_TURN_URL }}
        run: pnpm build:web

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 7

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    # Only deploy on push to main (not PRs, not manual runs unless you want)
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download web-dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: Deploy via rsync over SSH
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          ARGS: "-avz --delete"
          SOURCE: "dist/"
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          TARGET: "/home/${{ secrets.VPS_USER }}/disintea-server/web-dist/"

      - name: Reload nginx (no downtime)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/disintea-server
            docker compose exec nginx nginx -s reload
