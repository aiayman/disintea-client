name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (.msi / .exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set app version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg ver "$VERSION" '.version = $ver' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          echo "Set tauri version to $VERSION"

      - name: Build Tauri app (Windows)
        env:
          SIGNALING_URL: ${{ secrets.SIGNALING_URL }}
          TURN_URL: ${{ secrets.TURN_URL }}
          TURN_SECRET: ${{ secrets.TURN_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: pnpm tauri build --bundles msi,nsis

      - name: List bundle output
        shell: bash
        run: find src-tauri/target/release/bundle -type f 2>/dev/null || echo "No bundle output found"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig

  build-linux:
    name: Build Linux (.AppImage / .deb)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libssl-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set app version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg ver "$VERSION" '.version = $ver' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          echo "Set tauri version to $VERSION"

      - name: Build Tauri app (Linux)
        env:
          SIGNALING_URL: ${{ secrets.SIGNALING_URL }}
          TURN_URL: ${{ secrets.TURN_URL }}
          TURN_SECRET: ${{ secrets.TURN_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: pnpm tauri build --bundles appimage,deb

      - name: List bundle output
        run: find src-tauri/target/release/bundle -type f 2>/dev/null || echo "No bundle output found"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.sig
            src-tauri/target/release/bundle/deb/*.deb

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: List release artifacts
        run: find release-artifacts -type f

      - name: Generate latest.json update manifest
        run: |
          python3 scripts/gen-latest-json.py \
            "${GITHUB_REF_NAME#v}" \
            "${GITHUB_REF_NAME}" \
            "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            "${GITHUB_REPOSITORY}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Disintea ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            release-artifacts/**/*.msi
            release-artifacts/**/*.exe
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            latest.json
          body: |
            ## Disintea ${{ github.ref_name }}

            ### Downloads
            | Platform | Package |
            |---|---|
            | Windows | `.msi` installer or `.exe` (NSIS) |
            | Linux | `.AppImage` (portable) or `.deb` (Debian/Ubuntu) |
