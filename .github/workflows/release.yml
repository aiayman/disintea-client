name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (.msi / .exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set app version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg ver "$VERSION" '.version = $ver' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          echo "Set tauri version to $VERSION"

      - name: Build Tauri app (Windows)
        env:
          SIGNALING_URL: ${{ secrets.SIGNALING_URL }}
          TURN_URL: ${{ secrets.TURN_URL }}
          TURN_SECRET: ${{ secrets.TURN_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: pnpm tauri build --bundles msi,nsis

      - name: List bundle output
        shell: bash
        run: find src-tauri/target/release/bundle -type f 2>/dev/null || echo "No bundle output found"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig

  build-linux:
    name: Build Linux (.AppImage / .deb)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libssl-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set app version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg ver "$VERSION" '.version = $ver' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          echo "Set tauri version to $VERSION"

      - name: Build Tauri app (Linux)
        env:
          SIGNALING_URL: ${{ secrets.SIGNALING_URL }}
          TURN_URL: ${{ secrets.TURN_URL }}
          TURN_SECRET: ${{ secrets.TURN_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: pnpm tauri build --bundles appimage,deb

      - name: List bundle output
        run: find src-tauri/target/release/bundle -type f 2>/dev/null || echo "No bundle output found"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.sig
            src-tauri/target/release/bundle/deb/*.deb

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: List release artifacts
        run: find release-artifacts -type f

      - name: Generate latest.json update manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TAG="${GITHUB_REF_NAME}"

          # Find NSIS installer + sig
          # Tauri v2 names it: {productName}_{version}_x64-setup.exe
          WIN_EXE=$(find release-artifacts -name "*-setup.exe" ! -name "*.sig" | head -1)
          WIN_SIG=""
          if [ -n "$WIN_EXE" ] && [ -f "${WIN_EXE}.sig" ]; then
            WIN_SIG=$(cat "${WIN_EXE}.sig")
          fi
          WIN_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/$(basename "$WIN_EXE")"

          # Find AppImage + sig
          LINUX_AI=$(find release-artifacts -name "*.AppImage" ! -name "*.sig" | head -1)
          LINUX_SIG=""
          if [ -n "$LINUX_AI" ] && [ -f "${LINUX_AI}.sig" ]; then
            LINUX_SIG=$(cat "${LINUX_AI}.sig")
          fi
          LINUX_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/$(basename "$LINUX_AI")"

          python3 - <<PYEOF
          import json, os
          manifest = {
            "version": os.environ.get("VERSION", "${VERSION}"),
            "notes": "Disintea ${TAG}",
            "pub_date": "${DATE}",
            "platforms": {}
          }
          win_sig = """${WIN_SIG}"""
          linux_sig = """${LINUX_SIG}"""
          if win_sig.strip():
            manifest["platforms"]["windows-x86_64"] = {
              "signature": win_sig.strip(),
              "url": "${WIN_URL}"
            }
          if linux_sig.strip():
            manifest["platforms"]["linux-x86_64"] = {
              "signature": linux_sig.strip(),
              "url": "${LINUX_URL}"
            }
          with open("latest.json", "w") as f:
            json.dump(manifest, f, indent=2)
          print("Generated latest.json:")
          print(json.dumps(manifest, indent=2))
          PYEOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Disintea ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            release-artifacts/**/*.msi
            release-artifacts/**/*.exe
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            latest.json
          body: |
            ## Disintea ${{ github.ref_name }}

            ### Downloads
            | Platform | Package |
            |---|---|
            | Windows | `.msi` installer or `.exe` (NSIS) |
            | Linux | `.AppImage` (portable) or `.deb` (Debian/Ubuntu) |
