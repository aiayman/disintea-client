name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (.msi / .exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set app version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg ver "$VERSION" '.version = $ver' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          echo "Set tauri version to $VERSION"

      - name: Build Tauri app (Windows)
        env:
          SIGNALING_URL: ${{ secrets.SIGNALING_URL }}
          TURN_URL: ${{ secrets.TURN_URL }}
          TURN_SECRET: ${{ secrets.TURN_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: pnpm tauri build --bundles msi,nsis

      - name: List bundle output
        shell: bash
        run: find src-tauri/target/release/bundle -type f 2>/dev/null || echo "No bundle output found"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig

  build-linux:
    name: Build Linux (.AppImage / .deb)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libssl-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set app version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg ver "$VERSION" '.version = $ver' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          echo "Set tauri version to $VERSION"

      - name: Build Tauri app (Linux)
        env:
          SIGNALING_URL: ${{ secrets.SIGNALING_URL }}
          TURN_URL: ${{ secrets.TURN_URL }}
          TURN_SECRET: ${{ secrets.TURN_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: pnpm tauri build --bundles appimage,deb

      - name: List bundle output
        run: find src-tauri/target/release/bundle -type f 2>/dev/null || echo "No bundle output found"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.sig
            src-tauri/target/release/bundle/deb/*.deb

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: List release artifacts
        run: find release-artifacts -type f

      - name: Generate latest.json update manifest
        run: |
          # Let Python do all the filesystem reading — avoids multiline shell
          # variable expansion inside heredocs breaking signature embedding.
          python3 - \
            "${GITHUB_REF_NAME#v}" \
            "${GITHUB_REF_NAME}" \
            "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            "${GITHUB_REPOSITORY}" \
            <<'PYEOF'
import sys, json, glob, os

version, tag, pub_date, repo = sys.argv[1], sys.argv[2], sys.argv[3], sys.argv[4]
base_url = f"https://github.com/{repo}/releases/download/{tag}"

def find_file(pattern):
    # Search recursively under release-artifacts/
    matches = [p for p in glob.glob(f"release-artifacts/**/{pattern}", recursive=True)
               if not p.endswith(".sig")]
    return matches[0] if matches else None

def read_sig(path):
    sig_path = path + ".sig"
    if os.path.isfile(sig_path):
        return open(sig_path, "r").read().strip()
    return ""

manifest = {
    "version": version,
    "notes": f"Disintea {tag}",
    "pub_date": pub_date,
    "platforms": {}
}

# Windows NSIS — Tauri v2 names it: {ProductName}_{ver}_x64-setup.exe
win_exe = find_file("*-setup.exe")
if win_exe:
    sig = read_sig(win_exe)
    if sig:
        manifest["platforms"]["windows-x86_64"] = {
            "signature": sig,
            "url": f"{base_url}/{os.path.basename(win_exe)}"
        }
    else:
        print(f"WARNING: no .sig for {win_exe}", flush=True)
else:
    print("WARNING: no *-setup.exe found in release-artifacts", flush=True)

# Linux AppImage — Tauri v2 names it: {ProductName}_{ver}_amd64.AppImage
linux_ai = find_file("*.AppImage")
if linux_ai:
    sig = read_sig(linux_ai)
    if sig:
        manifest["platforms"]["linux-x86_64"] = {
            "signature": sig,
            "url": f"{base_url}/{os.path.basename(linux_ai)}"
        }
    else:
        print(f"WARNING: no .sig for {linux_ai}", flush=True)
else:
    print("WARNING: no *.AppImage found in release-artifacts", flush=True)

if not manifest["platforms"]:
    print("ERROR: latest.json has no platforms — update delivery will not work!", flush=True)
    sys.exit(1)

with open("latest.json", "w") as f:
    json.dump(manifest, f, indent=2)

print("Generated latest.json:")
print(json.dumps(manifest, indent=2))
PYEOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Disintea ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            release-artifacts/**/*.msi
            release-artifacts/**/*.exe
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            latest.json
          body: |
            ## Disintea ${{ github.ref_name }}

            ### Downloads
            | Platform | Package |
            |---|---|
            | Windows | `.msi` installer or `.exe` (NSIS) |
            | Linux | `.AppImage` (portable) or `.deb` (Debian/Ubuntu) |
